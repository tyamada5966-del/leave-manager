<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>有給休暇管理システム</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.3.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f8fa;color:#1a202c;font-size:15px}
.app{max-width:820px;margin:0 auto;padding:1.5rem 1rem 4rem}
.top-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px}
.top-header h1{font-size:20px;font-weight:700;color:#1a202c}
.top-header h1 span{font-size:13px;font-weight:400;color:#718096;margin-left:8px}
.tab-bar{display:flex;border-bottom:1px solid #e2e8f0;margin-bottom:1.5rem}
.tab-btn{padding:10px 20px;font-size:13px;font-weight:500;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;color:#718096;margin-bottom:-1px;position:relative}
.tab-btn.active{color:#3182ce;border-bottom-color:#3182ce}
.tab-pane{display:none}
.tab-pane.active{display:block}
.pending-dot{display:inline-block;background:#e53e3e;color:#fff;font-size:10px;padding:1px 6px;border-radius:99px;margin-left:5px;font-weight:700}
.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.sum-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:.875rem 1rem}
.sum-label{font-size:11px;color:#718096;margin-bottom:4px}
.sum-val{font-size:22px;font-weight:700;color:#1a202c}
.sum-val.danger{color:#e53e3e}.sum-val.warn{color:#d69e2e}.sum-val.success{color:#38a169}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.filter-btn{font-size:12px;padding:5px 13px;border:1px solid #cbd5e0;border-radius:99px;background:#fff;cursor:pointer;color:#4a5568}
.filter-btn.active{background:#ebf8ff;color:#2b6cb0;border-color:#90cdf4}
.emp-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.1rem 1.25rem;margin-bottom:10px;cursor:pointer}
.emp-card:hover{border-color:#90cdf4}
.emp-card.selected{border-color:#3182ce;border-width:2px}
.emp-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.emp-name{font-size:14px;font-weight:700;color:#1a202c}
.emp-sub{font-size:12px;color:#718096;margin-top:2px}
.badges{margin-left:auto;display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.badge{font-size:11px;padding:2px 9px;border-radius:99px;font-weight:600;white-space:nowrap}
.badge-neutral{background:#edf2f7;color:#4a5568}
.badge-success{background:#f0fff4;color:#276749}
.badge-warn{background:#fffff0;color:#744210}
.badge-danger{background:#fff5f5;color:#9b2335}
.badge-info{background:#ebf8ff;color:#2c5282}
.badge-pending{background:#fffaf0;color:#c05621}
.progress-labels{display:flex;justify-content:space-between;font-size:11px;color:#718096;margin-bottom:4px}
.progress-track{height:10px;border-radius:99px;background:#edf2f7;overflow:hidden;position:relative}
.progress-bar{height:100%;border-radius:99px;position:absolute;top:0;left:0;transition:width .3s}
.progress-pending{height:100%;position:absolute;top:0;opacity:.35}
.progress-foot{display:flex;justify-content:space-between;font-size:10px;color:#a0aec0;margin-top:3px}
.detail-panel{background:#f7fafc;border:1px solid #e2e8f0;border-radius:10px;padding:1rem;margin-top:10px}
.detail-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.detail-item{text-align:center;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:.65rem .5rem}
.detail-num{font-size:18px;font-weight:700;color:#1a202c}
.detail-lbl{font-size:11px;color:#718096;margin-top:2px}
.mini-table{width:100%;border-collapse:collapse;font-size:12px}
.mini-table th{font-size:11px;font-weight:500;color:#718096;text-align:left;padding:5px 6px;border-bottom:1px solid #e2e8f0}
.mini-table td{padding:6px 6px;border-bottom:1px solid #edf2f7;color:#2d3748;vertical-align:middle}
.mini-table tr:last-child td{border-bottom:none}
.add-rec-row{display:flex;gap:6px;align-items:flex-end;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid #e2e8f0}
.add-rec-row>div{display:flex;flex-direction:column}
.add-rec-row label{font-size:11px;color:#718096;margin-bottom:3px}
.add-rec-row input,.add-rec-row select{height:32px;font-size:12px;border:1px solid #cbd5e0;border-radius:6px;padding:0 8px;background:#fff;color:#1a202c}
.add-rec-btn{height:32px;padding:0 12px;background:#fff;border:1px solid #cbd5e0;border-radius:6px;cursor:pointer;font-size:12px;color:#2d3748;white-space:nowrap}
.add-rec-btn:hover{background:#edf2f7}
.remain-row{display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid #e2e8f0;flex-wrap:wrap}
.remain-row label{font-size:12px;color:#718096;white-space:nowrap}
.remain-row input{width:80px;height:32px;font-size:13px;text-align:center;border:1px solid #cbd5e0;border-radius:6px;padding:0 8px}
.duty-bar-wrap{margin-bottom:10px}
.duty-track{height:6px;border-radius:99px;background:#edf2f7;overflow:hidden}
.duty-fill{height:100%;border-radius:99px}
.req-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.1rem 1.25rem;margin-bottom:10px}
.req-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.req-name{font-size:14px;font-weight:700;color:#1a202c}
.req-meta{font-size:12px;color:#718096;margin-top:3px}
.req-days-big{font-size:24px;font-weight:700;color:#1a202c;text-align:right}
.req-days-lbl{font-size:11px;color:#718096;text-align:right}
.req-actions{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid #e2e8f0;align-items:center}
.req-hint{font-size:12px;color:#718096;flex:1}
.req-hint.danger{color:#e53e3e}
.btn-approve{padding:7px 18px;background:#f0fff4;color:#276749;border:1px solid #9ae6b4;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
.btn-reject{padding:7px 18px;background:#fff5f5;color:#9b2335;border:1px solid #feb2b2;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
.dot-pending{background:#d69e2e}.dot-approved{background:#38a169}.dot-rejected{background:#e53e3e}
.new-req-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row.single{grid-template-columns:1fr}
.form-row label{font-size:12px;color:#718096;display:block;margin-bottom:4px}
.form-row input,.form-row select{width:100%;height:36px;border:1px solid #cbd5e0;border-radius:8px;padding:0 10px;font-size:13px;background:#fff;color:#1a202c}
.submit-btn{width:100%;height:40px;background:#3182ce;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;margin-top:4px}
.submit-btn:hover{background:#2c5282}
.nq-hint{font-size:12px;color:#718096;margin-bottom:8px;padding:8px 12px;background:#ebf8ff;border-radius:6px}
.nq-hint.danger{background:#fff5f5;color:#9b2335}
.add-emp-btn{width:100%;padding:12px;border:1.5px dashed #cbd5e0;border-radius:12px;background:none;cursor:pointer;font-size:13px;color:#718096;margin-top:4px}
.add-emp-btn:hover{background:#f7fafc}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:1.75rem;width:360px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal h3{font-size:16px;font-weight:700;margin-bottom:1rem;color:#1a202c}
.modal label{font-size:12px;color:#718096;display:block;margin-top:10px;margin-bottom:3px}
.modal input,.modal select{width:100%;height:36px;border:1px solid #cbd5e0;border-radius:8px;padding:0 10px;font-size:13px;color:#1a202c}
.modal-btns{display:flex;gap:8px;margin-top:1.25rem}
.btn-primary{flex:1;height:38px;background:#3182ce;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
.btn-cancel{height:38px;padding:0 18px;background:#fff;border:1px solid #cbd5e0;border-radius:8px;cursor:pointer;font-size:13px;color:#4a5568}
.empty-state{text-align:center;color:#a0aec0;font-size:13px;padding:2.5rem 0}
.section-title{font-size:13px;font-weight:600;color:#4a5568;margin-bottom:.875rem;display:flex;align-items:center;gap:6px}
.loading{text-align:center;color:#718096;padding:2rem;font-size:13px}
@media(max-width:600px){
  .summary-row{grid-template-columns:repeat(2,1fr)}
  .detail-grid{grid-template-columns:repeat(2,1fr)}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <div class="top-header">
    <h1><i class="ti ti-calendar-check" style="font-size:22px;vertical-align:-4px;margin-right:6px;color:#3182ce"></i>有給休暇管理 <span id="year-label">2026年度</span></h1>
    <button class="add-emp-btn" style="width:auto;padding:6px 16px;border-style:solid;border-color:#cbd5e0;border-radius:8px" onclick="openAddEmp()">＋ 従業員を追加</button>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('dashboard',this)"><i class="ti ti-layout-dashboard" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i>進捗一覧</button>
    <button class="tab-btn" onclick="switchTab('requests',this)" id="tab-req"><i class="ti ti-inbox" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i>申請管理<span class="pending-dot" id="pending-badge" style="display:none">0</span></button>
    <button class="tab-btn" onclick="switchTab('new-request',this)"><i class="ti ti-edit" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i>申請を出す</button>
  </div>

  <div class="tab-pane active" id="pane-dashboard">
    <div class="summary-row" id="summary"></div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">全員</button>
      <button class="filter-btn" onclick="setFilter('正社員',this)">正社員</button>
      <button class="filter-btn" onclick="setFilter('契約社員',this)">契約社員</button>
      <button class="filter-btn" onclick="setFilter('duty',this)">義務未達</button>
      <button class="filter-btn" onclick="setFilter('low',this)">残少（3日以下）</button>
    </div>
    <div id="emp-list"><div class="loading">読み込み中...</div></div>
    <button class="add-emp-btn" onclick="openAddEmp()"><i class="ti ti-plus"></i> 従業員を追加</button>
  </div>

  <div class="tab-pane" id="pane-requests">
    <div class="filters">
      <button class="filter-btn active" onclick="setReqFilter('pending',this)">承認待ち</button>
      <button class="filter-btn" onclick="setReqFilter('all',this)">すべて</button>
      <button class="filter-btn" onclick="setReqFilter('approved',this)">承認済</button>
      <button class="filter-btn" onclick="setReqFilter('rejected',this)">否認</button>
    </div>
    <div id="req-list"></div>
  </div>

  <div class="tab-pane" id="pane-new-request">
    <div class="new-req-card">
      <div class="section-title"><i class="ti ti-calendar-plus" style="font-size:16px"></i>有給休暇 申請フォーム</div>
      <div class="form-row">
        <div><label>申請者</label><select id="nq-emp" onchange="updateHint()"></select></div>
        <div><label>取得区分</label><select id="nq-type"><option value="通常">通常</option><option value="欠勤振替">欠勤振替</option><option value="計画年休">計画年休（正社員のみ）</option></select></div>
      </div>
      <div class="form-row">
        <div><label>取得日（開始）</label><input type="date" id="nq-start"></div>
        <div><label>取得日（終了）</label><input type="date" id="nq-end"></div>
      </div>
      <div class="form-row">
        <div><label>取得単位</label><select id="nq-unit"><option value="1">1日</option><option value="0.5">半日（0.5日）</option></select></div>
        <div><label>取得日数</label><input type="number" id="nq-days" value="1" min="0.5" step="0.5"></div>
      </div>
      <div class="form-row single"><div><label>申請理由・備考</label><input type="text" id="nq-note" placeholder="例：私用のため"></div></div>
      <div id="nq-hint" style="display:none" class="nq-hint"></div>
      <button class="submit-btn" onclick="submitRequest()"><i class="ti ti-send"></i> 申請する</button>
    </div>
    <div class="section-title" style="margin-top:.5rem"><i class="ti ti-list" style="font-size:16px"></i>申請履歴</div>
    <div id="my-reqs"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-emp" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3><i class="ti ti-user-plus" style="font-size:18px;vertical-align:-3px;margin-right:6px;color:#3182ce"></i>従業員を追加</h3>
    <label>氏名 <span style="color:#e53e3e">*</span></label><input type="text" id="m-name" placeholder="山田 太郎">
    <label>雇用区分</label><select id="m-type"><option value="正社員">正社員</option><option value="契約社員">契約社員</option></select>
    <label>入社日 <span style="color:#e53e3e">*</span></label><input type="date" id="m-hire">
    <label>出勤率（%）</label><input type="number" id="m-att" value="90" min="0" max="100">
    <label>前年繰越日数</label><input type="number" id="m-carry" value="0" min="0" step="0.5">
    <label>当年付与日数（空白=自動計算）</label><input type="number" id="m-grant" placeholder="自動">
    <label>有休残日数を直接入力（空白=自動計算）</label><input type="number" id="m-remain" placeholder="例: 12">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-primary" onclick="saveEmp()">追加する</button>
    </div>
  </div>
</div>

<script>
const YEAR=2026;
const COLORS=[['#ebf8ff','#2c5282'],['#e6fffa','#285e61'],['#fff5f5','#742a2a'],['#faf5ff','#44337a'],['#fffff0','#744210'],['#f0fff4','#22543d'],['#fff5f5','#63171b'],['#e9d8fd','#44337a']];

const SUPABASE_URL='https://qlzvfobilpcwhxrnxeat.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsenZmb2JpbHBjd2h4cm54ZWF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNDIzMjMsImV4cCI6MjA5MzcxODMyM30.0byN6fXvKc6e4maXx3Q51P_LeyRwFGw9U7H6RXBXedg';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let state={employees:[],requests:[]};
let selectedId=null,activeFilter='all',activeReqFilter='pending';
let isLoading=false;

function toEmp(e){
  return{id:e.id,name:e.name,type:e.type,hire:e.hire,
    carry:Number(e.carry||0),
    grantOverride:e.grant_override!=null?Number(e.grant_override):null,
    att:Number(e.att||90),
    remainOverride:e.remain_override!=null?Number(e.remain_override):null,
    records:Array.isArray(e.records)?e.records:[]};
}
function toReq(r){
  return{id:r.id,empId:r.emp_id,empName:r.emp_name,
    type:r.type,start:r.start_date,end:r.end_date,
    days:Number(r.days),note:r.note||'',
    status:r.status,createdAt:(r.created_at||'').split('T')[0]};
}

async function loadData(){
  isLoading=true;
  document.getElementById('emp-list').innerHTML='<div class="loading"><i class="ti ti-loader" style="font-size:20px;display:block;margin:0 auto 8px"></i>データを読み込み中...</div>';
  try{
    const [{data:emps},{data:reqs}]=await Promise.all([
      sb.from('employees').select('*').order('id'),
      sb.from('requests').select('*').order('id')
    ]);
    state.employees=(emps||[]).map(toEmp);
    state.requests=(reqs||[]).map(toReq);
  }catch(e){console.error(e);alert('データの読み込みに失敗しました');}
  isLoading=false;
  renderAll();
}

async function dbSaveEmp(e){
  const row={name:e.name,type:e.type,hire:e.hire,carry:e.carry,
    grant_override:e.grantOverride,att:e.att,
    remain_override:e.remainOverride,records:e.records};
  if(e.id){
    await sb.from('employees').update(row).eq('id',e.id);
  }else{
    const {data}=await sb.from('employees').insert(row).select().single();
    if(data)e.id=data.id;
  }
}

async function dbDeleteEmp(empId){
  await sb.from('employees').delete().eq('id',empId);
}

async function dbSaveReq(r){
  const row={emp_id:r.empId,emp_name:r.empName,type:r.type,
    start_date:r.start,end_date:r.end,days:r.days,note:r.note,status:r.status};
  if(r.id){
    await sb.from('requests').update(row).eq('id',r.id);
  }else{
    const {data}=await sb.from('requests').insert(row).select().single();
    if(data)r.id=data.id;
  }
}

async function dbUpdateReqStatus(reqId,status){
  await sb.from('requests').update({status}).eq('id',reqId);
}

function monthsDiff(d1,d2){return(d2.getFullYear()-d1.getFullYear())*12+d2.getMonth()-d1.getMonth();}
function getAutoGrant(type,hire,att){
  if(att<80)return 0;
  const hd=new Date(hire),jan1=new Date(YEAR,0,1),h6m=new Date(hd);
  h6m.setMonth(h6m.getMonth()+6);
  if(type==='正社員'){
    const isFirstYear=h6m.getFullYear()===YEAR,base=isFirstYear?h6m:jan1,m=monthsDiff(hd,base);
    if(m<6)return 0;
    if(isFirstYear)return 10;
    const nthYear=YEAR-h6m.getFullYear();
    const grantTable=[0,11,12,14,16,18,20];
    return grantTable[Math.min(nthYear,6)]||20;
  }else{
    let base=new Date(hd);base.setMonth(base.getMonth()+6);
    while(base.getFullYear()<YEAR)base.setFullYear(base.getFullYear()+1);
    if(base.getFullYear()>YEAR)return 0;
    const m=monthsDiff(hd,base);
    if(m<6)return 0;if(m<18)return 10;if(m<30)return 11;if(m<42)return 12;if(m<54)return 14;if(m<66)return 16;if(m<78)return 18;return 20;
  }
}

function calcEmp(e){
  const grant=e.grantOverride!==null?e.grantOverride:getAutoGrant(e.type,e.hire,e.att);
  const total=e.carry+grant;
  const approvedDays=state.requests.filter(r=>r.empId===e.id&&r.status==='approved').reduce((s,r)=>s+r.days,0);
  const usedRecords=e.records.reduce((s,r)=>s+r.days,0);
  const used=usedRecords+approvedDays;
  const pendingDays=state.requests.filter(r=>r.empId===e.id&&r.status==='pending').reduce((s,r)=>s+r.days,0);
  const remain=e.remainOverride!==null?e.remainOverride-approvedDays:total-used;
  const dutyTarget=e.type==='正社員'&&grant>=10;
  const selfUsed=e.records.filter(r=>r.type!=='計画年休').reduce((s,r)=>s+r.days,0)+state.requests.filter(r=>r.empId===e.id&&r.status==='approved'&&r.type!=='計画年休').reduce((s,r)=>s+r.days,0);
  const planUsed=e.records.filter(r=>r.type==='計画年休').reduce((s,r)=>s+r.days,0)+state.requests.filter(r=>r.empId===e.id&&r.status==='approved'&&r.type==='計画年休').reduce((s,r)=>s+r.days,0);
  const dutyFilled=Math.min(selfUsed+planUsed,5);
  const dutyRemain=dutyTarget?Math.max(5-dutyFilled,0):0;
  const pct=total>0?Math.min(used/total*100,100):0;
  return{grant,total,used,remain,pendingDays,dutyTarget,dutyRemain,dutyFilled,pct};
}

function initials(n){return n.replace(/\s/g,'').slice(0,2);}

function switchTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pane-'+tab).classList.add('active');
  if(tab==='new-request'){populateEmpSelect();renderMyReqs();}
}

function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('#pane-dashboard .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderDashboard();
}
function setReqFilter(f,btn){
  activeReqFilter=f;
  document.querySelectorAll('#pane-requests .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderRequests();
}

function filteredEmps(){
  return state.employees.filter(e=>{
    if(activeFilter==='all')return true;
    if(activeFilter==='duty'){const c=calcEmp(e);return c.dutyTarget&&c.dutyRemain>0;}
    if(activeFilter==='low'){const c=calcEmp(e);return c.remain<=3;}
    return e.type===activeFilter;
  });
}

function renderAll(){
  updatePendingBadge();
  renderSummary();
  renderDashboard();
  renderRequests();
}

function updatePendingBadge(){
  const n=state.requests.filter(r=>r.status==='pending').length;
  const b=document.getElementById('pending-badge');
  b.style.display=n>0?'inline':'none';
  b.textContent=n;
}

function renderSummary(){
  const all=state.employees.map(calcEmp);
  const totalUsed=all.reduce((s,c)=>s+c.used,0);
  const avgRemain=state.employees.length?(all.reduce((s,c)=>s+c.remain,0)/state.employees.length).toFixed(1):0;
  const dutyNG=all.filter(c=>c.dutyTarget&&c.dutyRemain>0).length;
  const pending=state.requests.filter(r=>r.status==='pending').length;
  document.getElementById('summary').innerHTML=`
    <div class="sum-card"><div class="sum-label">従業員数</div><div class="sum-val">${state.employees.length}名</div></div>
    <div class="sum-card"><div class="sum-label">総取得日数</div><div class="sum-val">${totalUsed}日</div></div>
    <div class="sum-card"><div class="sum-label">平均残日数</div><div class="sum-val ${parseFloat(avgRemain)<=5?'warn':''}">${avgRemain}日</div></div>
    <div class="sum-card"><div class="sum-label">承認待ち申請</div><div class="sum-val ${pending>0?'warn':''}">${pending}件</div></div>`;
}

function renderDashboard(){
  const list=filteredEmps();
  const el=document.getElementById('emp-list');
  if(!list.length){el.innerHTML='<div class="empty-state">該当する従業員がいません</div>';return;}
  el.innerHTML=list.map(e=>{
    const c=calcEmp(e);
    const idx=state.employees.indexOf(e);
    const [bgC,fgC]=COLORS[idx%COLORS.length];
    const isOpen=selectedId===e.id;
    const usedPct=c.total>0?Math.min(c.used/c.total*100,100).toFixed(1):0;
    const pendingPct=c.total>0?Math.min(c.pendingDays/c.total*100,100).toFixed(1):0;
    const barColor=c.remain<=3?'#e53e3e':c.remain<=7?'#d69e2e':'#38a169';
    let badges=`<span class="badge badge-neutral">${e.type}</span>`;
    if(c.pendingDays>0)badges+=`<span class="badge badge-pending">申請中 ${c.pendingDays}日</span>`;
    if(c.dutyTarget&&c.dutyRemain===0)badges+=`<span class="badge badge-success">義務達成</span>`;
    if(c.dutyTarget&&c.dutyRemain>0)badges+=`<span class="badge badge-danger">義務未達</span>`;
    if(c.remain<=3&&c.remain>=0)badges+=`<span class="badge badge-danger">残少</span>`;
    if(e.remainOverride!==null)badges+=`<span class="badge badge-info">残数直接入力</span>`;
    let detail='';
    if(isOpen){
      const approvedReqs=state.requests.filter(r=>r.empId===e.id&&r.status==='approved');
      const pendingReqs=state.requests.filter(r=>r.empId===e.id&&r.status==='pending');
      const allEntries=[
        ...e.records.map(r=>({...r,src:'record'})),
        ...approvedReqs.map(r=>({date:r.start,days:r.days,type:r.type,src:'approved'})),
        ...pendingReqs.map(r=>({date:r.start,days:r.days,type:r.type,src:'pending'})),
      ].sort((a,b)=>a.date.localeCompare(b.date));
      const rows=allEntries.length===0
        ?'<tr><td colspan="4" style="text-align:center;color:#a0aec0">記録なし</td></tr>'
        :allEntries.map((r,ri)=>{
          const srcTag=r.src==='approved'?`<span style="font-size:10px;padding:1px 5px;border-radius:3px;background:#f0fff4;color:#276749;margin-left:4px">承認</span>`
            :r.src==='pending'?`<span style="font-size:10px;padding:1px 5px;border-radius:3px;background:#fffff0;color:#744210;margin-left:4px">申請中</span>`:'';
          const del=r.src==='record'?`<button onclick="event.stopPropagation();delRec(${e.id},${ri})" style="background:none;border:none;cursor:pointer;color:#a0aec0;font-size:14px"><i class="ti ti-trash"></i></button>`:'';
          return`<tr><td>${r.date.replace(/-/g,'/')}</td><td style="text-align:right">${r.days}日${srcTag}</td><td style="color:#718096">${r.type}</td><td>${del}</td></tr>`;
        }).join('');
      const dutyBar=c.dutyTarget?`<div class="duty-bar-wrap">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:#718096;margin-bottom:3px"><span>5日義務 充当状況</span><span>${c.dutyFilled.toFixed(1)} / 5日</span></div>
        <div class="duty-track"><div class="duty-fill" style="width:${Math.min(c.dutyFilled/5*100,100).toFixed(0)}%;background:${c.dutyRemain===0?'#38a169':'#d69e2e'}"></div></div>
      </div>`:'';
      const today=new Date().toISOString().split('T')[0];
      const typeOpts=e.type==='正社員'?'<option>通常</option><option>欠勤振替</option><option>計画年休</option>':'<option>通常</option><option>欠勤振替</option>';
      const dayOpts=e.type==='正社員'?'<option value="0.5">0.5日</option><option value="1" selected>1日</option><option value="2">2日</option><option value="3">3日</option><option value="4">4日</option><option value="5">5日</option>':'<option value="1" selected>1日</option><option value="2">2日</option><option value="3">3日</option><option value="4">4日</option><option value="5">5日</option>';
      const remainCol=c.remain<=3?'#e53e3e':c.remain<=7?'#d69e2e':'#38a169';
      detail=`<div class="detail-panel">
        <div class="detail-grid">
          <div class="detail-item"><div class="detail-num">${e.carry}</div><div class="detail-lbl">前年繰越</div></div>
          <div class="detail-item"><div class="detail-num">${c.grant}</div><div class="detail-lbl">当年付与</div></div>
          <div class="detail-item"><div class="detail-num">${c.used}</div><div class="detail-lbl">取得済</div></div>
          <div class="detail-item"><div class="detail-num" style="color:${remainCol}">${c.remain}</div><div class="detail-lbl">残日数${e.remainOverride!==null?'<br><small>直接入力</small>':''}</div></div>
        </div>
        ${dutyBar}
        <table class="mini-table">
          <thead><tr><th>日付</th><th style="text-align:right">日数</th><th>区分</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div class="add-rec-row">
          <div><label>取得日</label><input type="date" id="rd-${e.id}" value="${today}" style="width:130px" onclick="event.stopPropagation()"></div>
          <div><label>日数</label><select id="rdays-${e.id}" style="width:80px" onclick="event.stopPropagation()">${dayOpts}</select></div>
          <div><label>区分</label><select id="rtype-${e.id}" style="width:105px" onclick="event.stopPropagation()">${typeOpts}</select></div>
          <button class="add-rec-btn" onclick="event.stopPropagation();addRec(${e.id})"><i class="ti ti-plus"></i> 直接追加</button>
        </div>
        <div class="remain-row">
          <i class="ti ti-pencil" style="font-size:16px;color:#718096"></i>
          <label>有休残を直接入力：</label>
          <input type="number" id="ro-${e.id}" value="${e.remainOverride!==null?e.remainOverride:''}" placeholder="例: 12" min="0" step="0.5" onclick="event.stopPropagation()">
          <span style="font-size:12px;color:#718096">日</span>
          <button class="add-rec-btn" onclick="event.stopPropagation();setRemain(${e.id})">設定</button>
          ${e.remainOverride!==null?`<button class="add-rec-btn" style="color:#e53e3e;border-color:#feb2b2" onclick="event.stopPropagation();clearRemain(${e.id})">解除</button>`:''}
        </div>
        <div style="margin-top:10px;padding-top:10px;border-top:1px solid #e2e8f0;text-align:right">
          <button onclick="event.stopPropagation();deleteEmp(${e.id})" style="background:#fff5f5;color:#9b2335;border:1px solid #feb2b2;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer"><i class="ti ti-trash"></i> この従業員を削除</button>
        </div>
      </div>`;
    }
    return`<div class="emp-card ${isOpen?'selected':''}" onclick="toggleCard(${e.id})">
      <div class="emp-header">
        <div class="avatar" style="background:${bgC};color:${fgC}">${initials(e.name)}</div>
        <div><div class="emp-name">${e.name}</div><div class="emp-sub">取得 ${c.used}日 / 利用可能 ${c.total}日${c.pendingDays>0?' ／ 申請中 '+c.pendingDays+'日':''}</div></div>
        <div class="badges">${badges}</div>
      </div>
      <div>
        <div class="progress-labels"><span>取得率 ${parseFloat(usedPct).toFixed(0)}%${c.pendingDays>0?' (＋申請中 '+parseFloat(pendingPct).toFixed(0)+'%)':''}</span><span style="font-weight:700;color:${barColor}">残 ${c.remain}日</span></div>
        <div class="progress-track">
          <div class="progress-bar" style="width:${usedPct}%;background:${barColor}"></div>
          <div class="progress-pending" style="width:${pendingPct}%;left:${usedPct}%;background:#d69e2e"></div>
        </div>
        <div class="progress-foot"><span>繰越${e.carry}日 ＋ 当年${c.grant}日</span><span>${c.used}日取得済</span></div>
      </div>
      ${detail}
    </div>`;
  }).join('');
}

function renderRequests(){
  const list=state.requests.filter(r=>activeReqFilter==='all'||r.status===activeReqFilter).sort((a,b)=>b.id-a.id);
  const el=document.getElementById('req-list');
  if(!list.length){el.innerHTML='<div class="empty-state"><i class="ti ti-inbox" style="font-size:32px;display:block;margin-bottom:8px"></i>該当する申請はありません</div>';return;}
  const sLabel={pending:'承認待ち',approved:'承認済',rejected:'否認'};
  const dC={pending:'dot-pending',approved:'dot-approved',rejected:'dot-rejected'};
  el.innerHTML=list.map(r=>{
    const emp=state.employees.find(e=>e.id===r.empId);
    const c=emp?calcEmp(emp):null;
    const remain=c?c.remain:'-';
    const afterApprove=c?+(c.remain-r.days).toFixed(1):'-';
    const afterClass=typeof afterApprove==='number'&&afterApprove<0?'danger':'';
    const actions=r.status==='pending'?`<div class="req-actions">
      <span class="req-hint ${afterClass}">現在の残：${remain}日 → 承認後：${afterApprove}日</span>
      <button class="btn-reject" onclick="handleReq(${r.id},'rejected')"><i class="ti ti-x"></i> 否認</button>
      <button class="btn-approve" onclick="handleReq(${r.id},'approved')"><i class="ti ti-check"></i> 承認</button>
    </div>`:'';
    return`<div class="req-card">
      <div class="req-header">
        <div>
          <div class="req-name"><span class="status-dot ${dC[r.status]}"></span>${r.empName}</div>
          <div class="req-meta">${r.start}${r.start!==r.end?' 〜 '+r.end:''} ／ ${r.type} ／ 申請日 ${r.createdAt}</div>
          ${r.note?`<div class="req-meta" style="margin-top:3px">"${r.note}"</div>`:''}
        </div>
        <div><div class="req-days-big">${r.days}日</div><div class="req-days-lbl">${sLabel[r.status]}</div></div>
      </div>
      ${actions}
    </div>`;
  }).join('');
}

async function handleReq(reqId,newStatus){
  const r=state.requests.find(x=>x.id===reqId);
  if(!r)return;
  if(newStatus==='approved'){
    const emp=state.employees.find(e=>e.id===r.empId);
    const c=calcEmp(emp);
    if(c.remain-r.days<0&&!confirm(`残日数が不足します（承認後 ${+(c.remain-r.days).toFixed(1)}日）。それでも承認しますか？`))return;
  }
  r.status=newStatus;
  await dbUpdateReqStatus(reqId,newStatus);
  renderAll();
}

function toggleCard(id){
  selectedId=selectedId===id?null:id;
  renderDashboard();
}

async function addRec(empId){
  const e=state.employees.find(x=>x.id===empId);
  const d=document.getElementById(`rd-${empId}`).value;
  const days=parseFloat(document.getElementById(`rdays-${empId}`).value);
  const type=document.getElementById(`rtype-${empId}`).value;
  if(!d){alert('取得日を入力してください');return;}
  e.records.push({date:d,days,type});
  await dbSaveEmp(e);
  selectedId=empId;renderAll();
}

async function delRec(empId,ri){
  const e=state.employees.find(x=>x.id===empId);
  const sorted=[...e.records].sort((a,b)=>a.date.localeCompare(b.date));
  const target=sorted[ri];
  const idx=e.records.indexOf(target);
  if(idx!==-1)e.records.splice(idx,1);
  await dbSaveEmp(e);
  selectedId=empId;renderAll();
}

async function setRemain(empId){
  const e=state.employees.find(x=>x.id===empId);
  const v=document.getElementById(`ro-${empId}`).value;
  e.remainOverride=v!==''?parseFloat(v):null;
  await dbSaveEmp(e);
  selectedId=empId;renderAll();
}
async function clearRemain(empId){
  const e=state.employees.find(x=>x.id===empId);
  e.remainOverride=null;
  await dbSaveEmp(e);
  selectedId=empId;renderAll();
}

async function deleteEmp(empId){
  const e=state.employees.find(x=>x.id===empId);
  if(!confirm(`「${e.name}」を削除しますか？\n取得記録・申請データもすべて削除されます。`))return;
  await dbDeleteEmp(empId);
  state.employees=state.employees.filter(x=>x.id!==empId);
  state.requests=state.requests.filter(x=>x.empId!==empId);
  selectedId=null;
  renderAll();
}

function populateEmpSelect(){
  const sel=document.getElementById('nq-emp');
  sel.innerHTML=state.employees.map(e=>`<option value="${e.id}">${e.name}（${e.type}）</option>`).join('');
  updateHint();
}

function updateHint(){
  const empId=parseInt(document.getElementById('nq-emp').value);
  const emp=state.employees.find(e=>e.id===empId);
  if(!emp)return;
  const c=calcEmp(emp);
  const hint=document.getElementById('nq-hint');
  hint.style.display='block';
  hint.className='nq-hint'+(c.remain<=3?' danger':'');
  hint.innerHTML=`現在の有休残：<strong>${c.remain}日</strong>（利用可能 ${c.total}日 ／ 取得済 ${c.used}日）`;
}

async function submitRequest(){
  const empId=parseInt(document.getElementById('nq-emp').value);
  const type=document.getElementById('nq-type').value;
  const start=document.getElementById('nq-start').value;
  const end=document.getElementById('nq-end').value||start;
  const days=parseFloat(document.getElementById('nq-days').value)||1;
  const note=document.getElementById('nq-note').value;
  if(!start){alert('取得日を入力してください');return;}
  const emp=state.employees.find(e=>e.id===empId);
  const newReq={id:null,empId,empName:emp.name,type,start,end,days,note,status:'pending',createdAt:new Date().toISOString().split('T')[0]};
  await dbSaveReq(newReq);
  state.requests.push(newReq);
  document.getElementById('nq-start').value='';
  document.getElementById('nq-end').value='';
  document.getElementById('nq-days').value='1';
  document.getElementById('nq-note').value='';
  renderAll();renderMyReqs();
  alert(`${emp.name}さんの申請を提出しました。申請管理タブから承認してください。`);
}

function renderMyReqs(){
  const el=document.getElementById('my-reqs');
  const list=state.requests.slice().sort((a,b)=>b.id-a.id).slice(0,15);
  if(!list.length){el.innerHTML='<div class="empty-state">申請履歴がありません</div>';return;}
  const sl={pending:'承認待ち',approved:'承認済',rejected:'否認'};
  const dc={pending:'dot-pending',approved:'dot-approved',rejected:'dot-rejected'};
  el.innerHTML=`<table class="mini-table">
    <thead><tr><th>申請者</th><th>取得日</th><th style="text-align:right">日数</th><th>区分</th><th>状況</th></tr></thead>
    <tbody>${list.map(r=>`<tr>
      <td>${r.empName}</td><td style="color:#718096">${r.start}</td>
      <td style="text-align:right">${r.days}日</td><td style="color:#718096">${r.type}</td>
      <td><span class="status-dot ${dc[r.status]}"></span>${sl[r.status]}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}

function openAddEmp(){document.getElementById('modal-emp').classList.add('open');}
function closeModal(){document.getElementById('modal-emp').classList.remove('open');}
async function saveEmp(){
  const name=document.getElementById('m-name').value.trim();
  const type=document.getElementById('m-type').value;
  const hire=document.getElementById('m-hire').value;
  const carry=parseFloat(document.getElementById('m-carry').value)||0;
  const grantVal=document.getElementById('m-grant').value;
  const remainVal=document.getElementById('m-remain').value;
  const att=parseFloat(document.getElementById('m-att').value)||90;
  if(!name||!hire){alert('氏名と入社日は必須です');return;}
  const newEmp={id:null,name,type,hire,carry,
    grantOverride:grantVal!==''?parseFloat(grantVal):null,
    att,remainOverride:remainVal!==''?parseFloat(remainVal):null,records:[]};
  await dbSaveEmp(newEmp);
  state.employees.push(newEmp);
  closeModal();
  document.getElementById('m-name').value='';
  document.getElementById('m-hire').value='';
  document.getElementById('m-carry').value='0';
  document.getElementById('m-grant').value='';
  document.getElementById('m-remain').value='';
  selectedId=newEmp.id;
  renderAll();
}

const today=new Date().toISOString().split('T')[0];
document.getElementById('nq-start').value=today;
document.getElementById('nq-end').value=today;
loadData();
</script>
</body>
